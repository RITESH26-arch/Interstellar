<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #0b0d10;
             display: flex;
             justify-content: center;
             align-items: center;
             min-height: 100vh;
             margin: 0;
             ">


<!-- Background Stars AND ShotingStar -->
<div class="stars"></div>
<div class="shooting-stars">
  <span></span>
  <span></span>
  
</div>

<!-- Main DIV BOx -->

<div style="
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
">

  <div style="
  background:#0b0d10; 
  border:2px solid #1E2228;
  min-height: auto;
  width:300px;
  padding: 24px;
  border-radius:16px;
  display:flex;
  flex-direction: column;
  justify-content:center;
  align-items:center;
">
<h2 style="color:white; 
          margin-bottom: 14px;">Re-set Password</h2>
<br>

<!-- Re-Enter the Password -->

<input style=" width:100%;
              padding:12px;
              margin-bottom:12px;
              background:#14171C;
              border:1px solid #1E2228;
              border-radius:10px;
              color:#FFFFFF;             
              font-size:14px;
              outline:none;
              box-sizing:border-box;" 
              type="password" 
              id="ResetPassword"
              placeholder="Enter New Password">

<br>

<input style=" width:100%;
              padding:12px;
              margin-bottom:12px;
              background:#14171C;
              border:1px solid #1E2228;
              border-radius:10px;
              color:#FFFFFF;             
              font-size:14px;
              outline:none;
              box-sizing:border-box;" 
              type="password" 
              id="ResetRePassword"
              placeholder="Re-Enter Password">

<br>

<!-- Password ReSet Submit button -->

<button 
id="PasswordRestSubmitButton"
style="color: #FF2D6F; 
            width: 100%;
            height: 46px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            background-color:#ffff;
            cursor: pointer;">
            Join the Mission
          </button>
<br>
</div>


<script>
document
  .getElementById("PasswordRestSubmitButton")
  .addEventListener("click", async function () {

    const password = document.getElementById("ResetPassword").value.trim();
    const rePassword = document.getElementById("ResetRePassword").value.trim();

    // 🔴 Basic validation
    if (password === "" || rePassword === "") {
      alert("Password fields cannot be empty");
      return;
    }

    if (password.length < 6) {
      alert("Password must be at least 6 characters long");
      return;
    }

    if (password !== rePassword) {
      alert("Passwords do not match ❌");
      return;
    }

    // ✅ GET email saved from forgot-password step
    const email = localStorage.getItem("reset_email");
    console.log(localStorage.getItem("reset_email"));

    if (!email) {
      alert("Session expired. Please try again.");
      window.location.href = "ForgotPassword.html";
      return;
    }

    try {
      const response = await fetch("/forgot-password/reset", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          email: email,        
          new_password: password
        })
      });

      const data = await response.json();

      if (data.status === "success") {   // k
        alert("Password reset successful ✅");
        //localStorage.removeItem("reset_email");
        window.location.href = "index.html";
      } else {
        alert(data.msg || "Password reset failed ❌");
      }

    } catch (error) {
      console.error(error);
      alert("Server error, please try again later");
    }
});
</script>


    
</body>
</html>
