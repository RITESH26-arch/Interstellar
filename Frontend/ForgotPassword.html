<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <body style="background-color: #0b0d10;
             display: flex;
             justify-content: center;
             align-items: center;
             min-height: 100vh;
             margin: 0;
             ">


<!-- Background Stars AND ShotingStar -->
<div class="stars"></div>
<div class="shooting-stars">
  <span></span>
  <span></span>
  
</div>



<div style="
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
">



<!-- The Main Div Box -->

  <div style="
  background:#0b0d10; 
  border:2px solid #1E2228;
  min-height: auto;
  width:300px;
  padding: 24px;
  border-radius:16px;
  display:flex;
  flex-direction: column;
  justify-content:center;
  align-items:center;
">
<h2 style="color:white; 
          margin-bottom: 14px;">Security Question check</h2>
<br>

<!-- Name above the Box -->

<div style="width:100%; margin-bottom:16px;">
  <label style="
    display:block;
    color:#9AA4B2;
    font-size:13px;
    margin-bottom:6px;
  ">
    Select a Security Question
  </label>



<!-- Drop Down for the  Security Question -->

<select style=" width:100%;
              padding:12px;
              margin-bottom:12px;
              background:#14171C;
              border:1px solid #1E2228;
              border-radius:10px;
              color:#FFFFFF;             
              font-size:14px;
              outline:none;
              box-sizing:border-box;"  
              id="Question"
              placeholder="Select a Question">
            <option value="School">Waht is your School Name</option>
            <option value="Movie">What is your Favourite Movie</option>
            <option value="Food">What is your Favourite Food</option>
        </select>
</div>
<br>



<div style="width:100%; margin-bottom:16px;">
  <label style="
    display:block;
    color:#9AA4B2;
    font-size:13px;
    margin-bottom:6px;
  ">
    Answer
  </label>


  <input 
    id="Answer"
    placeholder="Enter Your Answer"
    style="
      width:100%;
      padding:12px 42px 12px 12px;
      background:#14171C;
      border:1px solid #1E2228;
      border-radius:8px;
      color:white;
      font-size:14px;
      box-sizing: border-box;
    "
  >
</div>

<p id="errorMsg" style="
  color:#FF2D6F;
  font-size:13px;
  display:none;
  margin-top:6px;
">
</p>

<button 
onclick="checkSecurity()"
style="color: #FF2D6F; 
       width: 100%;
       height: 46px;
       border-radius: 10px;
       border: none;
       font-size: 14px;
       background-color:#ffff;
       cursor: pointer;">
Next
</button>

</div>
<br>


<script>
async function checkSecurity() {
  const question = document.getElementById("Question").value;
  const answer = document.getElementById("Answer").value.trim();
  const errorMsg = document.getElementById("errorMsg");

  errorMsg.style.display = "none";

  if (answer === "") {
    errorMsg.style.display = "block";
    errorMsg.innerText = "Answer cannot be empty";
    alert("Answer cannot be empty");
    return;
  }

  try {
    const response = await fetch("http://localhost:5000/verify-security", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        question: question,
        answer: answer
      })
    });

    const data = await response.json();

    if (data.success) {
      // ✅ DB se match hua
      window.location.href = "reset-password.html";
    } else {
      // ❌ DB se match nahi hua
      errorMsg.style.display = "block";
      errorMsg.innerText = data.message || "Security answer incorrect ❌";
      alert("Wrong security answer");
    }

  } catch (error) {
    console.error(error);
    alert("Server error, try again later");
  }
}
</script>

</body>
</html>
