<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Question Check</title>
<link rel="stylesheet" href="style.css">
</head>

<body style="background-color: #0b0d10;
             display: flex;
             justify-content: center;
             align-items: center;
             min-height: 100vh;
             margin: 0;">

<div class="stars"></div>
<div class="shooting-stars">
  <span></span>
  <span></span>
</div>

<div style="display:flex; flex-direction:column; align-items:center; gap:14px;">

<div style="
  background:#0b0d10; 
  border:2px solid #1E2228;
  width:300px;
  padding:24px;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
">

<h2 style="color:white; margin-bottom:14px;">
  Forgot Password
</h2>

<br>

<!-- EMAIL -->
<div style="width:100%; 
margin-bottom:16px;" 
id="emailBox">
<label style="display:block; 
              color:#9AA4B2; 
              font-size:13px; 
              margin-bottom:6px;">
Email
</label>

<input id="email" placeholder="Enter your email"
                                                style="width:100%; 
                                                padding:12px; 
                                                background:#14171C; 
                                                border:1px solid #1E2228;
                                                border-radius:8px; 
                                                color:white; 
                                                font-size:14px; 
                                                box-sizing:border-box;">
</div>


<!-- CHOICE OPTIONS -->
<div id="choiceBox" style="display:none; 
                            width:100%; 
                            margin-bottom:16px;">
<button onclick="sendOTP()" style="width:100%; margin-bottom:10px;
padding:12px; border-radius:8px; border:none;">
Verify via OTP
</button>

<button onclick="useSecurityQuestion()" style="width:100%;
padding:12px; border-radius:8px; border:none;">
Use Security Question
</button>
</div>



<!-- OTP BOX -->

<div id="otpBox" style="display:none; width:100%; margin-bottom:16px; box-sizing:border-box;">
<label style="display:block; color:#9AA4B2; font-size:13px; margin-bottom:6px;">
Enter OTP
</label>

<input id="otpInput" placeholder="Enter OTP"
style="width:100%; padding:12px; background:#14171C; 
border:1px solid #1E2228; border-radius:8px; 
color:white; font-size:14px; box-sizing:border-box;">
</div>




<!-- Security Question -->

<div style="width:100%; margin-bottom:16px; display:none; box-sizing:border-box;" id="questionBox">
<label style="display:block; color:#9AA4B2; font-size:13px; margin-bottom:6px;">
Security Question
</label>

<p id="securityQuestion" style="color:white; background:#14171C;
border:1px solid #1E2228; padding:12px; 
border-radius:10px; font-size:14px; 
box-sizing:border-box;"></p>
</div>




<!-- Answer -->

<div style="width:100%; margin-bottom:16px; display:none; box-sizing:border-box;" id="answerBox">
<label style="display:block; color:#9AA4B2; font-size:13px; margin-bottom:6px;">
Answer
</label>

<input id="Answer" placeholder="Enter Your Answer"
style="width:100%; padding:12px; background:#14171C; 
border:1px solid #1E2228; border-radius:8px; 
color:white; font-size:14px; box-sizing:border-box;">
</div>




<p id="errorMsg" style="color:#FF2D6F; font-size:13px; display:none;"></p>

<button onclick="handleNext()" id="nextBtn"
style="color:#FF2D6F; width:100%; height:46px; border-radius:10px;
border:none; font-size:14px; background-color:#ffffff; cursor:pointer;">
Next
</button>

</div>
</div>





<script>
let userEmail = "";

/* Show error */
function showError(msg){
  const e=document.getElementById("errorMsg");
  e.style.display="block";
  e.innerText=msg;
}

/* STEP 1 */
function handleNext(){
  document.getElementById("errorMsg").style.display="none";

  const email=document.getElementById("email").value.trim();

  if(!email){
    showError("Email required");
    return;
  }

  userEmail=email;

  document.getElementById("emailBox").style.display="none";
  document.getElementById("choiceBox").style.display="block";
  document.getElementById("nextBtn").style.display="none";
}

/* SEND OTP */
async function sendOTP(){

  const res=await fetch("/send-otp",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:userEmail,action:"forgot-password"})
  });

  const data=await res.json();

  if(data.status==="success"){
    document.getElementById("choiceBox").style.display="none";
    document.getElementById("otpBox").style.display="block";
    const btn=document.getElementById("nextBtn");
    btn.innerText="Verify OTP";
    btn.style.display="block";
    btn.onclick=verifyOTP;
  }else showError(data.msg);
}

/* VERIFY OTP */
async function verifyOTP(){

  const otp=document.getElementById("otpInput").value.trim();

  const res=await fetch("/verify-otp",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:userEmail,action:"forgot-password",otp})
  });

  const data=await res.json();

  if(data.status==="success"){
    localStorage.setItem("reset_email",userEmail);
    window.location.href="ResetPassword.html";
  }else showError("Invalid OTP");
}

/* USE SECURITY QUESTION */
async function useSecurityQuestion(){

  const res=await fetch("/forgot-password/question",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:userEmail})
  });

  const data=await res.json();

  if(data.status==="success"){
    document.getElementById("choiceBox").style.display="none";

    document.getElementById("securityQuestion").innerText=data.question;
    document.getElementById("questionBox").style.display="block";
    document.getElementById("answerBox").style.display="block";

    const btn=document.getElementById("nextBtn");
    btn.innerText="Verify Answer";
    btn.style.display="block";
    btn.onclick=verifyAnswer;
  }else showError(data.msg);
}

/* VERIFY ANSWER */
async function verifyAnswer(){

  const ans=document.getElementById("Answer").value.trim();

  const res=await fetch("/forgot-password/verify",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:userEmail,answer:ans})
  });

  const data=await res.json();

  if(data.status==="success"){
    localStorage.setItem("reset_email",userEmail);
    window.location.href="ResetPassword.html";
  }else showError("Wrong answer");
}
</script>

</body>
</html>
