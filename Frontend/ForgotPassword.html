<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Question Check</title>
    <link rel="stylesheet" href="style.css">
</head>

<body style="background-color: #0b0d10;
             display: flex;
             justify-content: center;
             align-items: center;
             min-height: 100vh;
             margin: 0;">

<!-- Background Stars AND Shooting Star -->
<div class="stars"></div>
<div class="shooting-stars">
  <span></span>
  <span></span>
</div>

<div style="
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
">

<!-- Main Box -->
<div style="
  background:#0b0d10; 
  border:2px solid #1E2228;
  width:300px;
  padding:24px;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
">

<h2 style="color:white; margin-bottom:14px;">
  Security Question Check
</h2>

<br>

<!-- EMAIL -->
<div style="width:100%; margin-bottom:16px;" id="emailBox">
  <label style="
    display:block;
    color:#9AA4B2;
    font-size:13px;
    margin-bottom:6px;
  ">
    Email
  </label>

  <input 
    id="email"
    placeholder="Enter your email"
    style="
      width:100%;
      padding:12px;
      background:#14171C;
      border:1px solid #1E2228;
      border-radius:8px;
      color:white;
      font-size:14px;
      box-sizing:border-box;
    ">
</div>

<!-- Security Question (TEXT – FROM DB) -->
<div style="width:100%; margin-bottom:16px; display:none;" id="questionBox">
  <label style="
    display:block;
    color:#9AA4B2;
    font-size:13px;
    margin-bottom:6px;
  ">
    Security Question
  </label>

  <p id="securityQuestion" style="
    color:white;
    background:#14171C;
    border:1px solid #1E2228;
    padding:12px;
    border-radius:10px;
    font-size:14px;
  ">
  </p>
</div>

<br>

<!-- Answer -->
<div style="width:100%; margin-bottom:16px; display:none;" id="answerBox">
  <label style="
    display:block;
    color:#9AA4B2;
    font-size:13px;
    margin-bottom:6px;
  ">
    Answer
  </label>

  <input 
    id="Answer"
    placeholder="Enter Your Answer"
    style="
      width:100%;
      padding:12px;
      background:#14171C;
      border:1px solid #1E2228;
      border-radius:8px;
      color:white;
      font-size:14px;
      box-sizing:border-box;
    ">
</div>

<p id="errorMsg" style="
  color:#FF2D6F;
  font-size:13px;
  display:none;
  margin-top:6px;
">
</p>

<button 
onclick="handleNext()"
id="nextBtn"
style="color:#FF2D6F; 
       width:100%;
       height:46px;
       border-radius:10px;
       border:none;
       font-size:14px;
       background-color:#ffffff;
       cursor:pointer;">
Next
</button>

</div>
<br>

<script>
let step = 1;
let userEmail = "";

/* Handle next steps */
async function handleNext() {
  const errorMsg = document.getElementById("errorMsg");
  errorMsg.style.display = "none";

  // STEP 1: EMAIL
  if (step === 1) {
    const email = document.getElementById("email").value.trim();

    if (!email) {
      errorMsg.style.display = "block";
      errorMsg.innerText = "Email is required";
      return;
    }

    try {
      const response = await fetch("http://localhost:5000/forgot-password/question", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });

      const data = await response.json();

      if (data.status === "success") {
        userEmail = email;
        document.getElementById("securityQuestion").innerText = data.question;

        document.getElementById("emailBox").style.display = "none";
        document.getElementById("questionBox").style.display = "block";
        document.getElementById("answerBox").style.display = "block";

        step = 2;
      } else {
        errorMsg.style.display = "block";
        errorMsg.innerText = "Email not found";
      }

    } catch (err) {
      alert("Server error");
    }
  }

  // STEP 2: VERIFY ANSWER
  else if (step === 2) {
    const answer = document.getElementById("Answer").value.trim();

    if (!answer) {
      errorMsg.style.display = "block";
      errorMsg.innerText = "Answer cannot be empty";
      return;
    }

    try {
      const response = await fetch("http://localhost:5000/forgot-password/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: userEmail,
          answer: answer
        })
      });

      const data = await response.json();

      if (data.status === "success") {
        localStorage.setItem("reset_email", userEmail);
        window.location.href = "ResetPassword.html";
      } else {
        errorMsg.style.display = "block";
        errorMsg.innerText = data.msg || "Wrong answer ❌";
      }

    } catch (err) {
      alert("Server error");
    }
  }
}
</script>

</body>
</html>
