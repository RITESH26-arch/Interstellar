<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body style="background-color: #0b0d10;
             display: flex;
             justify-content: center;
             align-items: center;
             min-height: 100vh;
             margin: 0;
             ">

<!-- Background Stars AND ShootingStar -->
<div class="stars"></div>
<div class="shooting-stars">
  <span></span>
  <span></span>
</div>

<div style="
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
">

<!-- Login Box -->
<div style="
  background:#0b0d10; 
  border:2px solid #1E2228;
  min-height: auto;
  width:300px;
  padding: 24px;
  border-radius:16px;
  display:flex;
  flex-direction: column;
  justify-content:center;
  align-items:center;
">
<h2 style="color:white; 
          margin-bottom: 14px;">New Astronaut Signing-Up</h2>
<br>

<!-- Email -->
<div style="width:100%; margin-bottom:16px;">
  <label style="
    display:block;
    color:#9AA4B2;
    font-size:13px;
    margin-bottom:6px;
  ">
    Email Address
  </label>

<input style=" width:100%;
              padding:12px;
              margin-bottom:12px;
              background:#14171C;
              border:1px solid #1E2228;
              border-radius:10px;
              color:#FFFFFF;             
              font-size:14px;
              outline:none;
              box-sizing:border-box;" 
              type="email" 
              id="email"
              placeholder="Astrount@gmail.com">
</div>
<br>

<!-- Password -->
<div style="position:relative; width:100%;">
<div style="width:100%; margin-bottom:16px;">
  <label style="
    display:block;
    color:#9AA4B2;
    font-size:13px;
    margin-bottom:6px;
  ">
    Password
  </label>

  <input 
    type="password"
    id="password"
    placeholder="Enter Your Password"
    style="
      width:100%;
      padding:12px 42px 12px 12px;
      background:#14171C;
      border:1px solid #1E2228;
      border-radius:8px;
      color:white;
      font-size:14px;
      box-sizing: border-box;
    "
  >
</div>
</div>
<br>

<!-- Confirm Password -->
<div style="position: relative; width:100%;">
  <input 
    type="password"
    id="confirmpassword"
    placeholder="Confirm Password"
    style="
      width:100%;
      padding:12px 42px 12px 12px;
      background:#14171C;
      border:1px solid #1E2228;
      border-radius:8px;
      color:white;
      font-size:14px;
      box-sizing: border-box;
    "
  >
</div>

<br>

<!-- 🔽 LOCATION DROPDOWN (ONLY CHANGE MADE HERE) -->
<div style="width:100%; margin-bottom:16px;">
  <label style="
    display:block;
    color:#9AA4B2;
    font-size:13px;
    margin-bottom:6px;
  ">
    Location / City
  </label>

  <select 
    id="location"
    style="width:100%;
      padding:12px;
      margin-bottom:12px;
      background:#14171C;
      border:1px solid #1E2228;
      border-radius:10px;
      color:#FFFFFF;             
      font-size:14px;
      outline:none;
      box-sizing:border-box;">
      
    <option value="">-- Select Your City --</option>
    <option value="Pune">Pune</option>
    <option value="Mumbai">Mumbai</option>
    <option value="Delhi">Delhi</option>
    <option value="Bangalore">Bangalore</option>
    <option value="Hyderabad">Hyderabad</option>
  </select>
</div>

<br>

<!-- Security Question -->
<div style="width:100%; margin-bottom:16px;">
  <label style="
    display:block;
    color:#9AA4B2;
    font-size:13px;
    margin-bottom:6px;
  ">
    Select a Security Question
  </label>

<select style=" width:100%;
              padding:12px;
              margin-bottom:12px;
              background:#14171C;
              border:1px solid #1E2228;
              border-radius:10px;
              color:#FFFFFF;             
              font-size:14px;
              outline:none;
              box-sizing:border-box;"  
              id="Question">
  <option value="">-- Select a Question --</option>
  <option value="1">What is your School Name</option>
  <option value="2">What is your favourite Movie</option>
  <option value="3">What is your favourite Food</option>

</select>
</div>

<br>

<!-- Security Answer -->
<div style="width:100%; margin-bottom:16px;">
  <label style="
    display:block;
    color:#9AA4B2;
    font-size:13px;
    margin-bottom:6px;
  ">
    Security Answer
  </label>

  <input 
    id="Answer"
    placeholder="Enter Your Answer"
    style="
      width:100%;
      padding:12px 42px 12px 12px;
      background:#14171C;
      border:1px solid #1E2228;
      border-radius:8px;
      color:white;
      font-size:14px;
      box-sizing: border-box;
    "
  >
</div>

<!-- Sign-Up button -->
<button 
id="submitbtn"
onclick="signupUser()"
style="color: #FF2D6F; 
       width: 100%;
       height: 46px;
       border-radius: 10px;
       border: none;
       font-size: 14px;
       background-color:#ffff;
       cursor: pointer;">
  Join the Mission
</button>
<br>
</div>

<div>
  <a href="index.html" style="color: #B6BCC6; text-decoration:none;">
    login
  </a>
</div>

</div>

<!-- Script -->
<script>
async function signupUser() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const confirmPassword = document.getElementById("confirmpassword").value.trim();
  const location = document.getElementById("location").value.trim();
  const question = document.getElementById("Question").value;
  const answer = document.getElementById("Answer").value.trim();

  if (!email || !password || !confirmPassword || !location || !question || !answer) {
    alert("Please fill all fields ❌");
    return;
  }

  if (password !== confirmPassword) {
    alert("Passwords do not match ❌");
    return;
  }

  if (password.length < 6) {
    alert("Password must be at least 6 characters long");
    return;
  }

  try {
    const response = await fetch("http://localhost:5000/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: email,
        password: password,
        location: location,
        security_question: question,
        security_answer: answer
      })
    });

    const data = await response.json();

    if (data.status == "success") {
      alert("Joined The Mission successfully 🚀");
      localStorage.setItem("isLoggedIn", "true");
      window.location.href = "Home.html";
    } else {
      alert(data.msg || "Signup failed ❌");
    }

  } catch (error) {
    console.error(error);
    alert("Server error, try again later");
  }
}
</script>

</body>
</html>
